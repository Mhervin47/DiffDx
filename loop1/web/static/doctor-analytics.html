<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiffDx — Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/auth.js"></script>
  <style>
    .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
    @media (max-width:880px){ .kpi-grid { grid-template-columns:repeat(2,1fr); } }
    .kpi-card {
      background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px; position:relative; overflow:hidden;
    }
    .kpi-icon {
      width:38px; height:38px; border-radius:var(--radius); display:flex;
      align-items:center; justify-content:center; margin-bottom:14px;
    }
    .kpi-value { font-size:34px; font-weight:800; line-height:1; }
    .kpi-label {
      font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      color:var(--text-muted); margin-top:8px;
    }

    .panel {
      background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius);
      padding:20px; margin-bottom:24px;
    }
    .panel-title {
      font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      color:var(--text-muted); margin-bottom:18px;
    }

    .chart { display:flex; align-items:flex-end; gap:14px; height:200px; padding-top:10px; }
    .chart-col { flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; }
    .bar-stack {
      width:100%; max-width:46px; display:flex; flex-direction:column-reverse;
      border-radius:4px 4px 0 0; overflow:hidden; min-height:2px;
      transition:height .4s ease;
    }
    .bar-seg { width:100%; }
    .bar-booked { background:var(--primary); }
    .bar-noshow { background:var(--danger); }
    .bar-open { background:var(--surface-4); }
    .chart-label { font-size:10px; color:var(--text-muted); margin-top:8px; font-weight:600; }
    .legend { display:flex; gap:16px; margin-top:16px; }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-muted); }
    .legend-dot { width:10px; height:10px; border-radius:2px; }

    /* push content below fixed pill nav (top:16px + height:52px + gap:16px) */
    .page { padding-top: 84px; }

    table.ns-table { width:100%; border-collapse:collapse; }
    .ns-table th {
      text-align:left; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
      color:var(--text-muted); padding:8px 10px; border-bottom:1px solid var(--border);
    }
    .ns-table td { font-size:13px; color:var(--text); padding:10px; border-bottom:1px solid var(--border); }
    .ns-count {
      display:inline-block; min-width:24px; text-align:center; font-weight:700;
      background:rgba(255,107,107,.14); color:var(--danger); border-radius:99px; padding:2px 8px; font-size:12px;
    }
    .empty-row { text-align:center; color:var(--text-muted); padding:24px; font-size:13px; }
  </style>
</head>
<body>

<nav class="nav">
  <button class="nav-back" onclick="window.location.href='/doctor-portal.html'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Portal
  </button>
  <div class="nav-brand" style="margin-left:8px;">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 8px rgba(16,185,129,.5))">
      <defs>
        <linearGradient id="da-ring" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
        <linearGradient id="da-ft" x1="13" y1="14" x2="19" y2="8" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
        <linearGradient id="da-fb" x1="13" y1="14" x2="19" y2="20" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
      </defs>
      <circle cx="14" cy="14" r="12.5" stroke="url(#da-ring)" stroke-width="1.25" fill="rgba(16,185,129,.08)"/>
      <line x1="6" y1="14" x2="13" y2="14" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
      <path d="M13 14 L19 8.5" stroke="url(#da-ft)" stroke-width="2" stroke-linecap="round"/>
      <path d="M13 14 L19 19.5" stroke="url(#da-fb)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="8.5" r="2" fill="#34d399"/>
      <circle cx="20" cy="19.5" r="2" fill="#a855f7"/>
    </svg>
    <span style="font-family:'Sora',sans-serif;font-size:15px;font-weight:800;letter-spacing:-.03em;color:#f1f5f9;">Diff<span style="background:linear-gradient(90deg,#10b981,#34d399);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">/Dx</span></span>
  </div>
  <div style="margin-left:10px;font-size:12px;color:var(--text-muted);">Analytics</div>
  <div class="nav-spacer"></div>
  <div id="nav-auth" style="display:flex;align-items:center;gap:6px;margin-right:8px;"></div>
</nav>

<div class="page">
  <div style="margin-bottom:24px;">
    <div class="section-title" style="margin-bottom:2px;">Practice Analytics</div>
    <div style="font-size:13px;color:var(--text-muted);">No-show trends and slot utilization.</div>
  </div>

  <div id="analytics-container">
    <div class="thinking-row"><div class="spinner"></div> Loading analytics…</div>
  </div>
</div>

<script>
const user = getAuthUser();
if (!user) { window.location.replace('/login.html?next=/doctor-analytics.html'); }
else if (user.role !== 'doctor') { window.location.replace('/'); }

function escHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
  catch { return iso; }
}

const ICONS = {
  appts:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00b4d8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  util:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="18" y="3" width="4" height="18" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="2" y="13" width="4" height="8" rx="1"/></svg>`,
  noshow:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
  patients:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
};

function kpiCard(icon, color, value, label) {
  return `<div class="kpi-card">
    <div class="kpi-icon" style="background:${color}22;">${icon}</div>
    <div class="kpi-value" style="color:${color};">${value}</div>
    <div class="kpi-label">${label}</div>
  </div>`;
}

function render(data) {
  const k = data.kpis || {};
  const weekly = data.weekly || [];
  const maxTotal = Math.max(1, ...weekly.map(w => w.booked + w.noshow + w.open));

  const chart = weekly.map(w => {
    const total = w.booked + w.noshow + w.open;
    const h = Math.round((total / maxTotal) * 100);
    const seg = (cls, n) => n > 0 ? `<div class="bar-seg ${cls}" style="height:${(n/total)*100}%"></div>` : '';
    return `<div class="chart-col">
      <div class="bar-stack" style="height:${h}%" title="Wk ${escHtml(w.label)} · ${w.booked} booked, ${w.noshow} no-show, ${w.open} open">
        ${total > 0 ? seg('bar-booked', w.booked) + seg('bar-noshow', w.noshow) + seg('bar-open', w.open) : ''}
      </div>
      <div class="chart-label">${escHtml(w.label)}</div>
    </div>`;
  }).join('');

  const ns = data.noshows || [];
  const nsRows = ns.length ? ns.map(n => `
    <tr>
      <td>${escHtml(n.patient_name)}</td>
      <td><span class="ns-count">${n.count}</span></td>
      <td>${fmtDate(n.last_date)}</td>
      <td>${n.total}</td>
    </tr>`).join('')
    : `<tr><td colspan="4" class="empty-row">No no-shows recorded. Great attendance.</td></tr>`;

  document.getElementById('analytics-container').innerHTML = `
    <div class="kpi-grid">
      ${kpiCard(ICONS.appts, '#00b4d8', k.total_appts ?? 0, 'Total Appointments')}
      ${kpiCard(ICONS.util, '#10b981', (k.utilization_pct ?? 0) + '%', 'Slot Utilization')}
      ${kpiCard(ICONS.noshow, '#ef4444', (k.noshow_rate ?? 0) + '%', 'No-show Rate')}
      ${kpiCard(ICONS.patients, '#8b5cf6', k.total_patients ?? 0, 'Total Patients')}
    </div>

    <div class="panel">
      <div class="panel-title">Slot Utilization — Last 8 Weeks</div>
      <div class="chart">${chart || '<div class="empty-row">No data.</div>'}</div>
      <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="background:var(--primary);"></span>Booked</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--danger);"></span>No-show</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--surface-4);"></span>Open</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">No-show Patients</div>
      <table class="ns-table">
        <thead><tr><th>Patient</th><th>No-shows</th><th>Last No-show</th><th>Total Booked</th></tr></thead>
        <tbody>${nsRows}</tbody>
      </table>
    </div>`;
}

async function load() {
  const c = document.getElementById('analytics-container');
  try {
    const res = await fetch('/api/doctor/analytics', { headers: { ...authHeaders() } });
    if (!res.ok) {
      if (res.status === 401) { clearAuth(); window.location.replace('/login.html'); return; }
      throw new Error(await res.text());
    }
    render(await res.json());
  } catch (e) {
    c.innerHTML = `<div class="error-msg">Error loading analytics: ${escHtml(e.message)}</div>`;
  }
}

load();
</script>
</body>
</html>
