<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiffDx — Diagnostic Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/auth.js"></script>
  <style>
    body { overflow: hidden; }
    .session-wrapper { display: flex; flex-direction: column; height: calc(100vh - 56px - 38px); }

    /* Right panel extras */
    .diff-header {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 16px;
    }
    .diff-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .confidence-section {
      border-top: 1px solid var(--border); padding-top: 14px; margin-top: 14px;
    }
    .conf-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .conf-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); }
    .conf-val { font-size: 18px; font-weight: 700; color: var(--primary); }
    .conf-track {
      height: 8px; background: var(--surface-4); border-radius: 99px; overflow: hidden;
    }
    .conf-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--primary-dim), var(--primary));
      transition: width .5s ease;
    }
    .session-meta {
      border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px;
      font-size: 11px; color: var(--text-muted); display: flex; flex-direction: column; gap: 3px;
    }
    .model-tag { color: var(--text-muted); }

    /* Complete overlay */
    .complete-banner {
      background: rgba(78,222,163,.08);
      border: 1px solid rgba(78,222,163,.25);
      border-radius: var(--radius-lg); padding: 16px 20px;
      text-align: center; margin: 16px 20px 0;
    }
    .complete-banner-title { font-size: 15px; font-weight: 700; color: var(--success); margin-bottom: 4px; }
    .complete-banner-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }

    /* Health slogan thinking indicator */
    .health-thinking {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 4px;
      background: none; border: none;
    }
    .health-thinking-dots {
      display: flex; gap: 5px; flex-shrink: 0;
    }
    .health-thinking-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted); opacity: .25;
      animation: dot-pulse .9s ease-in-out infinite;
    }
    .health-thinking-dots span:nth-child(2) { animation-delay: .18s; }
    .health-thinking-dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes dot-pulse {
      0%,80%,100% { opacity: .2; transform: scale(.8); }
      40%          { opacity: 1;  transform: scale(1.15); }
    }
    .health-thinking-slogan {
      font-size: 13px; color: var(--text-muted); font-style: italic;
      animation: slogan-fade .7s ease;
    }
    @keyframes slogan-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Full-page session start loader */
    #session-loader {
      position: fixed; inset: 0; z-index: 999;
      background: var(--surface-1);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
    }
    .loader-icon {
      width: 64px; height: 64px; margin-bottom: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(0,180,216,.18), transparent 70%);
      animation: loader-pulse 2s ease-in-out infinite;
    }
    @keyframes loader-pulse {
      0%,100% { transform: scale(1);   opacity: .9; }
      50%      { transform: scale(1.08); opacity: 1; }
    }
    .loader-title {
      font-size: 17px; font-weight: 700; color: var(--text);
      margin-bottom: 8px; letter-spacing: -.01em;
    }
    .loader-tip {
      font-size: 13px; color: var(--text-muted); font-style: italic;
      max-width: 340px; text-align: center; line-height: 1.55;
      min-height: 44px;
      animation: slogan-fade .6s ease;
    }
    .loader-bar-track {
      width: 180px; height: 3px;
      background: var(--surface-4); border-radius: 99px;
      overflow: hidden; margin-top: 28px;
    }
    .loader-bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--primary-dim), var(--primary));
      width: 0%;
      transition: width .4s ease;
    }
    .loader-dots {
      display: flex; gap: 7px; margin-top: 20px;
    }
    .loader-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--primary); opacity: .25;
      animation: dot-pulse .9s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: .18s; }
    .loader-dots span:nth-child(3) { animation-delay: .36s; }

    /* ── voice UI ── */
    .voice-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-top: 1px solid rgba(255,255,255,.05);
      background: rgba(0,0,0,.15); flex-shrink: 0;
    }
    .voice-toggle {
      display: flex; align-items: center; gap: 6px;
      background: none; border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px; padding: 5px 10px; color: var(--text-muted);
      font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font);
      transition: all .15s;
    }
    .voice-toggle.active { border-color: rgba(0,180,216,.45); color: var(--primary); background: rgba(0,180,216,.08); }
    .voice-toggle svg { flex-shrink: 0; }
    .voice-select-wrap {
      display: flex; align-items: center; gap: 6px;
      animation: slogan-fade .2s ease;
    }
    .voice-select-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .voice-select {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      border-radius: 7px; color: var(--text); font-size: 12px; font-family: var(--font);
      padding: 4px 8px; cursor: pointer; outline: none; transition: border-color .15s;
    }
    .voice-select:focus { border-color: rgba(0,180,216,.45); }
    .voice-autoplay-wrap { display: flex; align-items: center; gap: 5px; margin-left: 4px; }
    .voice-autoplay-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .voice-speaking-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--primary); font-weight: 600;
      background: rgba(0,180,216,.08); border: 1px solid rgba(0,180,216,.2);
      border-radius: 6px; padding: 3px 9px;
      animation: slogan-fade .2s ease;
    }
    .speaking-dots { display: flex; gap: 3px; }
    .speaking-dots span {
      width: 4px; height: 4px; border-radius: 50%; background: var(--primary);
      animation: dot-pulse .7s ease-in-out infinite;
    }
    .speaking-dots span:nth-child(2) { animation-delay: .14s; }
    .speaking-dots span:nth-child(3) { animation-delay: .28s; }
    .mic-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 10px; border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04); color: var(--text-muted);
      cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    .mic-btn:hover { border-color: rgba(0,180,216,.4); color: var(--primary); background: rgba(0,180,216,.08); }
    .mic-btn.recording {
      border-color: rgba(239,68,68,.6); color: #f87171; background: rgba(239,68,68,.1);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.3); }
      50%      { box-shadow: 0 0 0 6px rgba(239,68,68,.0); }
    }
    .tts-replay-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: none; border: none; color: var(--text-muted);
      font-size: 11px; cursor: pointer; padding: 2px 6px;
      border-radius: 5px; transition: color .12s;
      font-family: var(--font);
    }
    .tts-replay-btn:hover { color: var(--primary); }

    /* ── premium session overrides ── */
    .session-wrapper { background: #07090f; }
    .conf-track { background: rgba(255,255,255,.06); }
    .conf-fill { background: linear-gradient(90deg, #0077a8, #00b4d8, #38bdf8); }
    .conf-val { font-size: 20px; font-weight: 900; letter-spacing: -.03em; }
    .diff-header { font-size: 10px; font-weight: 800; letter-spacing: .1em; }
    .complete-banner {
      background: rgba(78,222,163,.07);
      border: 1px solid rgba(78,222,163,.2);
      border-radius: 14px;
    }
    .complete-banner-title { font-size: 15px; font-weight: 800; }
    .session-meta { border-top: 1px solid rgba(255,255,255,.06); }
    #session-loader {
      background: #07090f;
    }
    .loader-icon {
      background: radial-gradient(circle at 40% 40%, rgba(0,180,216,.22), transparent 70%);
      box-shadow: 0 0 40px rgba(0,180,216,.08);
    }
    .loader-title { font-size: 18px; font-weight: 900; letter-spacing: -.03em; }
    .loader-bar-track { background: rgba(255,255,255,.06); }
    .loader-bar-fill { background: linear-gradient(90deg, #0077a8, #00b4d8, #38bdf8); }
    .health-thinking-dots span { background: var(--primary); }
    .health-thinking-slogan { font-size: 13px; color: var(--text-muted); }
    .session-right { background: rgba(0,0,0,.2); }
    .confidence-section { border-top: 1px solid rgba(255,255,255,.06); }
  </style>
</head>
<body>

<nav class="nav">
  <button class="nav-back" onclick="window.location.href='/history.html'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    History
  </button>
  <div class="nav-brand" style="margin-left:8px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    AI Diagnostic Assistant
  </div>
  <div class="nav-spacer"></div>
  <span id="case-chip" class="badge badge-dim" style="margin-right:8px;"></span>
  <span id="turn-chip" class="badge badge-teal">Turn 0</span>
  <span id="status-chip" class="badge badge-dim" style="margin-left:8px;">Starting…</span>
  <div class="spacer"></div>
  <div id="nav-auth" style="display:flex;align-items:center;gap:6px;margin-right:8px;"></div>

</nav>

<div class="session-wrapper">
  <div class="session-layout">
    <!-- LEFT: conversation -->
    <div class="session-left">
      <div class="convo-header">
        <div class="convo-header-complaint" id="complaint-header">Loading…</div>
        <div style="font-size:12px;color:var(--text-muted);">Diagnostic session in progress</div>
      </div>
      <div class="convo-scroll" id="convo-scroll">
      </div>
      <div id="complete-area"></div>
      <div class="answer-bar" id="answer-bar">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Speak your answer" style="display:none;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <textarea class="answer-textarea" id="answer-input"
          placeholder="Type your answer here…" rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="btn btn-primary btn-sm" id="send-btn" onclick="sendAnswer()">
          Send
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <!-- Voice controls bar -->
      <div class="voice-bar" id="voice-bar">
        <button class="voice-toggle" id="voice-toggle-btn" onclick="toggleVoice()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          Voice
        </button>
        <div class="voice-select-wrap" id="voice-select-wrap" style="display:none;">
          <span class="voice-select-label">Doctor voice:</span>
          <select class="voice-select" id="voice-select" onchange="onVoiceChange(this.value)">
            <option value="">Loading…</option>
          </select>
          <div class="voice-autoplay-wrap">
            <input type="checkbox" id="voice-autoplay" checked onchange="onAutoplayChange(this.checked)" style="accent-color:var(--primary);cursor:pointer;">
            <label class="voice-autoplay-label" for="voice-autoplay">Auto-play</label>
          </div>
        </div>
        <div id="voice-speaking-area" style="margin-left:auto;"></div>
      </div>
    </div>

    <!-- RIGHT: live differential -->
    <div class="session-right">
      <div class="diff-header">Live Differential</div>
      <div class="diff-list" id="diff-list">
        <div class="thinking-row"><div class="spinner"></div> Awaiting first turn…</div>
      </div>
      <div class="confidence-section">
        <div class="conf-row">
          <span class="conf-label">Confidence to Stop</span>
          <span class="conf-val" id="conf-val">—</span>
        </div>
        <div class="conf-track"><div class="conf-fill" id="conf-fill" style="width:0%"></div></div>
        <div class="session-meta" id="session-meta"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let sessionId = sessionStorage.getItem('sessionId');
let startData = JSON.parse(sessionStorage.getItem('sessionStart') || 'null');

// Fall back to localStorage if the tab was closed and reopened
if (!sessionId || !startData) {
  sessionId = localStorage.getItem('activeSessionId');
  startData = JSON.parse(localStorage.getItem('activeSessionStart') || 'null');
  if (sessionId && startData) {
    sessionStorage.setItem('sessionId', sessionId);
    sessionStorage.setItem('sessionStart', JSON.stringify(startData));
  }
}

if (!sessionId || !startData) window.location.href = '/';

function _clearActiveSession() {
  localStorage.removeItem('activeSessionId');
  localStorage.removeItem('activeSessionStart');
}

let turnCount = 0;
let sessionComplete = false;
let currentQuestion = '';

// ---- Init ----
function init() {
  const complaint = startData.chief_complaint || '';
  const truncated = complaint.length > 40 ? complaint.slice(0, 38) + '…' : complaint;
  document.getElementById('case-chip').textContent = truncated;
  document.getElementById('complaint-header').textContent = complaint || '…';
  document.getElementById('session-meta').innerHTML =
    `<span class="model-tag">Session ID: ${sessionId.slice(0,8)}…</span>`;

  // First doctor question is already in startData
  updateDifferential(startData.differential || []);
  updateConfidence(startData.confidence_to_stop || 0);

  const scroll = document.getElementById('convo-scroll');
  scroll.innerHTML = '';
  appendDoctorBubble(startData.doctor_question, null);
  currentQuestion = startData.doctor_question;
  setTurnChip(0, startData.differential?.length > 0);
}

// ---- Sending an answer ----
async function sendAnswer() {
  if (sessionComplete) return;
  const input = document.getElementById('answer-input');
  const answer = input.value.trim();
  if (!answer) return;

  if (typeof stopSpeaking === 'function') stopSpeaking();
  input.value = '';
  autoResize(input);
  setInputEnabled(false);

  // Show patient bubble
  appendPatientBubble(answer);

  // Show thinking
  const thinkId = appendThinking();

  try {
    const res = await fetch(`${API}/api/session/${sessionId}/turn`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ patient_answer: answer }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    removeThinking(thinkId);
    turnCount++;
    setTurnChip(turnCount, true);

    // Show critique for the turn we just submitted
    if (data.critique) {
      appendCritique(data.critique);
    }

    updateDifferential(data.differential || []);
    updateConfidence(data.confidence_to_stop || 0);

    if (data.session_complete) {
      sessionComplete = true;
      _clearActiveSession();
      setStatusChip('Complete', 'badge-green');
      if (typeof stopSpeaking === 'function') stopSpeaking();
      showCompleteArea(data.termination_reason);
      setInputEnabled(false);
      hideAnswerBar();
    } else {
      appendDoctorBubble(data.doctor_question, null);
      currentQuestion = data.doctor_question;
      setInputEnabled(true);
    }
  } catch (e) {
    removeThinking(thinkId);
    appendError(`API error: ${e.message}`);
    setInputEnabled(true);
  }
}

// ---- DOM helpers ----
function appendDoctorBubble(question, critiqueData) {
  if (!question) return;
  const scroll   = document.getElementById('convo-scroll');
  const div      = document.createElement('div');
  const bubbleId = `bubble-${Date.now()}`;
  div.innerHTML = `
    <div class="bubble-doctor">
      <div class="bubble-doctor-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <div class="bubble-doctor-body">
        <div class="bubble-doctor-label" style="display:flex;align-items:center;gap:8px;">
          Doctor
          <button class="tts-replay-btn" id="${bubbleId}-replay" onclick="_replayBubble('${bubbleId}')" title="Read aloud" style="display:none;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            Play
          </button>
        </div>
        <span id="${bubbleId}-text">${escHtml(question)}</span>
      </div>
    </div>
  `;
  scroll.appendChild(div);
  scrollToBottom();

  // Show replay button if voice is on, and auto-play if configured
  if (typeof _voiceEnabled !== 'undefined' && _voiceEnabled) {
    const replayBtn = document.getElementById(`${bubbleId}-replay`);
    if (replayBtn) replayBtn.style.display = 'inline-flex';
    if (_autoplay) speakText(question);
  }
}

function appendPatientBubble(answer) {
  const scroll = document.getElementById('convo-scroll');
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="bubble-patient">
      <div class="bubble-patient-body">${escHtml(answer)}</div>
    </div>
  `;
  scroll.appendChild(div);
  scrollToBottom();
}

function appendCritique(c) {
  const scroll = document.getElementById('convo-scroll');
  const qColor = scoreColor(c.question_quality_score);
  const dColor = scoreColor(c.differential_quality_score);
  const rColor = scoreColor(c.reasoning_quality_score);
  const weakBadge = c.weakness_category && c.weakness_category !== 'other'
    ? `<span class="badge badge-amber" style="font-size:11px;">${c.weakness_category.replace(/_/g,' ')}</span>`
    : '';
  const wha = c.would_have_asked && c.question_quality_score < 0.7
    ? `<div class="would-have-asked">Would have asked: "${escHtml(c.would_have_asked)}"</div>`
    : '';

  const div = document.createElement('div');
  div.innerHTML = `
    <div class="turn-critique">
      <div class="turn-critique-header">Critic Score ${weakBadge}</div>
      ${scoreBar('Q-Quality', c.question_quality_score, qColor)}
      ${scoreBar('Diff', c.differential_quality_score, dColor)}
      ${scoreBar('Reasoning', c.reasoning_quality_score, rColor)}
      ${wha}
    </div>
  `;
  scroll.appendChild(div);
  scrollToBottom();
}

function scoreBar(label, val, color) {
  const pct = Math.round((val ?? 0) * 100);
  return `
    <div class="score-bar-row">
      <span class="score-bar-label">${label}</span>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="score-bar-val" style="color:${color}">${val?.toFixed(2) ?? '—'}</span>
    </div>`;
}

function scoreColor(v) {
  if (v == null) return 'var(--text-muted)';
  if (v >= 0.7) return 'var(--success)';
  if (v >= 0.5) return 'var(--warning)';
  return 'var(--danger)';
}

const _HEALTH_SLOGANS = [
  "An apple a day keeps the doctor away.",
  "Early diagnosis is the best medicine.",
  "Your health is your greatest wealth.",
  "Prevention is better than cure.",
  "Listen to your body — it knows best.",
  "A good laugh and a long sleep are the best cures.",
  "Take care of your body. It's the only place you have to live.",
  "The groundwork of all happiness is health.",
  "He who has health has hope; he who has hope has everything.",
  "Walking is the best medicine.",
  "Let food be thy medicine and medicine be thy food.",
  "Sleep is the golden chain that ties health and our bodies together.",
  "Good health is not something we can buy. However, it can be an investment.",
  "The first wealth is health.",
  "A healthy outside starts from the inside.",
];

let thinkCounter = 0;
const _thinkTimers = {};

function appendThinking() {
  const id = `think-${++thinkCounter}`;
  const scroll = document.getElementById('convo-scroll');
  const div = document.createElement('div');
  div.id = id;
  div.className = 'health-thinking';
  div.innerHTML = `
    <div class="health-thinking-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="health-thinking-slogan" id="${id}-slogan">${_HEALTH_SLOGANS[0]}</div>
  `;
  scroll.appendChild(div);
  scrollToBottom();

  // Cycle through slogans every ~1s while thinking
  let idx = Math.floor(Math.random() * _HEALTH_SLOGANS.length);
  _thinkTimers[id] = setInterval(() => {
    const el = document.getElementById(`${id}-slogan`);
    if (!el) { clearInterval(_thinkTimers[id]); return; }
    idx = (idx + 1) % _HEALTH_SLOGANS.length;
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = '';
    el.textContent = _HEALTH_SLOGANS[idx];
  }, 900);

  return id;
}

function removeThinking(id) {
  clearInterval(_thinkTimers[id]);
  delete _thinkTimers[id];
  document.getElementById(id)?.remove();
}

function appendError(msg) {
  const scroll = document.getElementById('convo-scroll');
  const div = document.createElement('div');
  div.innerHTML = `<div class="error-msg" style="margin:8px 0">${escHtml(msg)}</div>`;
  scroll.appendChild(div);
  scrollToBottom();
}

function updateDifferential(diff) {
  const list = document.getElementById('diff-list');
  if (!diff || diff.length === 0) return;
  list.innerHTML = diff.map((d, i) => `
    <div class="diff-bar-row${i === 0 ? ' top-dx' : ''}">
      <div class="diff-bar-header">
        <span class="diff-bar-name">${i + 1}. ${escHtml(d.dx)}</span>
        <span class="diff-bar-prob">${Math.round((d.prob ?? 0) * 100)}%</span>
      </div>
      <div class="diff-bar-track">
        <div class="diff-bar-fill" style="width:${Math.round((d.prob ?? 0) * 100)}%"></div>
      </div>
    </div>
  `).join('');
}

function updateConfidence(val) {
  const pct = Math.round((val ?? 0) * 100);
  document.getElementById('conf-val').textContent = (val ?? 0).toFixed(2);
  document.getElementById('conf-fill').style.width = `${pct}%`;
}

function setTurnChip(n, active) {
  const chip = document.getElementById('turn-chip');
  chip.textContent = `Turn ${n}`;
  chip.className = `badge ${active ? 'badge-teal' : 'badge-dim'}`;
  if (!active) setStatusChip('Initializing', 'badge-dim');
  else setStatusChip('Active', 'badge-teal');
}

function setStatusChip(text, cls) {
  const chip = document.getElementById('status-chip');
  chip.textContent = text;
  chip.className = `badge ${cls}`;
}

function showCompleteArea(reason) {
  const area = document.getElementById('complete-area');
  area.innerHTML = `
    <div class="complete-banner">
      <div class="complete-banner-title">Session Complete</div>
      <button class="btn btn-primary" onclick="viewReport()">View Full Report →</button>
    </div>
  `;
}

function hideAnswerBar() {
  document.getElementById('answer-bar').style.display = 'none';
}

function setInputEnabled(enabled) {
  document.getElementById('answer-input').disabled = !enabled;
  document.getElementById('send-btn').disabled = !enabled;
}

function scrollToBottom() {
  const s = document.getElementById('convo-scroll');
  s.scrollTop = s.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAnswer();
  }
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function viewReport() {
  window.location.href = '/report.html';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =====================================================================
// Voice — Browser SpeechSynthesis (TTS) + SpeechRecognition (STT)
// =====================================================================
const _VOICE_KEY      = 'voice_enabled_v1';
const _VOICE_URI_KEY  = 'voice_uri_v1';
const _VOICE_AUTO_KEY = 'voice_autoplay_v1';

let _voiceEnabled  = localStorage.getItem(_VOICE_KEY) === '1';
let _selectedVoiceURI = localStorage.getItem(_VOICE_URI_KEY) || '';
let _autoplay      = localStorage.getItem(_VOICE_AUTO_KEY) !== '0';
let _isSpeaking    = false;

// SpeechRecognition setup
const _SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let _recognition = null;
let _isRecording = false;

// Build voice selector from browser voices — only once
let _voicesPopulated = false;
function _loadVoices() {
  const sel = document.getElementById('voice-select');
  if (!sel) return;
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  if (!voices.length) return;
  if (!_voicesPopulated) {
    sel.innerHTML = voices.map(v =>
      `<option value="${v.voiceURI}">${v.name}${v.localService ? '' : ' ☁'}</option>`
    ).join('');
    _voicesPopulated = true;
  }
  // Always restore saved selection (or default to first)
  if (!_selectedVoiceURI || !voices.find(v => v.voiceURI === _selectedVoiceURI)) {
    _selectedVoiceURI = voices[0].voiceURI;
    localStorage.setItem(_VOICE_URI_KEY, _selectedVoiceURI);
  }
  sel.value = _selectedVoiceURI;
}

// Voices load asynchronously in some browsers
window.speechSynthesis.onvoiceschanged = _loadVoices;

function _applyVoiceUI() {
  const btn    = document.getElementById('voice-toggle-btn');
  const wrap   = document.getElementById('voice-select-wrap');
  const micBtn = document.getElementById('mic-btn');
  if (_voiceEnabled) {
    btn.classList.add('active');
    wrap.style.display = 'flex';
    if (_SR) micBtn.style.display = 'flex';
    document.getElementById('voice-autoplay').checked = _autoplay;
    _loadVoices();
  } else {
    btn.classList.remove('active');
    wrap.style.display = 'none';
    micBtn.style.display = 'none';
    stopSpeaking();
  }
}

function toggleVoice() {
  _voiceEnabled = !_voiceEnabled;
  localStorage.setItem(_VOICE_KEY, _voiceEnabled ? '1' : '0');
  _applyVoiceUI();
  document.querySelectorAll('.tts-replay-btn').forEach(b => {
    b.style.display = _voiceEnabled ? 'inline-flex' : 'none';
  });
}

function onVoiceChange(val) {
  _selectedVoiceURI = val;
  localStorage.setItem(_VOICE_URI_KEY, val);
}

function onAutoplayChange(val) {
  _autoplay = val;
  localStorage.setItem(_VOICE_AUTO_KEY, val ? '1' : '0');
}

function speakText(text) {
  if (!_voiceEnabled || !text) return;
  stopSpeaking();
  const voices = window.speechSynthesis.getVoices();
  const voice  = voices.find(v => v.voiceURI === _selectedVoiceURI) || voices.find(v => v.lang.startsWith('en')) || null;
  const utt    = new SpeechSynthesisUtterance(text);
  if (voice) utt.voice = voice;
  utt.rate   = 0.95;
  utt.pitch  = 1.0;
  utt.volume = 1.0;
  utt.onstart = () => _setSpeakingUI(true);
  utt.onend   = () => _setSpeakingUI(false);
  utt.onerror = () => _setSpeakingUI(false);
  window.speechSynthesis.speak(utt);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  _setSpeakingUI(false);
}

function _setSpeakingUI(speaking) {
  _isSpeaking = speaking;
  const area = document.getElementById('voice-speaking-area');
  if (!area) return;
  area.innerHTML = speaking
    ? `<div class="voice-speaking-badge"><div class="speaking-dots"><span></span><span></span><span></span></div> Speaking…<button onclick="stopSpeaking()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px;margin-left:4px;font-family:var(--font);">✕</button></div>`
    : '';
}

// SpeechRecognition (browser mic)
function toggleMic() {
  if (!_SR) { alert('Speech recognition is not supported in this browser. Please use Chrome or Edge.'); return; }
  if (_isRecording) {
    _recognition?.stop();
  } else {
    _startRecognition();
  }
}

function _startRecognition() {
  _recognition = new _SR();
  _recognition.lang = 'en-US';
  _recognition.interimResults = true;
  _recognition.continuous = false;

  const micBtn   = document.getElementById('mic-btn');
  const input    = document.getElementById('answer-input');
  const existing = input.value.trim();

  _recognition.onstart = () => {
    _isRecording = true;
    micBtn.classList.add('recording');
    micBtn.title = 'Recording… click to stop';
    stopSpeaking();
  };

  _recognition.onresult = (e) => {
    let interim = '', final = '';
    for (const r of e.results) {
      if (r.isFinal) final  += r[0].transcript;
      else            interim += r[0].transcript;
    }
    input.value = (existing ? existing + ' ' : '') + (final || interim);
    autoResize(input);
  };

  _recognition.onerror = (e) => {
    if (e.error !== 'no-speech') console.warn('STT error:', e.error);
    _stopRecognitionUI();
  };

  _recognition.onend = () => { _stopRecognitionUI(); };
  _recognition.start();
}

function _stopRecognitionUI() {
  _isRecording = false;
  const micBtn = document.getElementById('mic-btn');
  if (micBtn) { micBtn.classList.remove('recording'); micBtn.title = 'Speak your answer'; }
}

function _replayBubble(bubbleId) {
  const el = document.getElementById(`${bubbleId}-text`);
  if (el) speakText(el.textContent);
}

// Init voice on page load
if (_voiceEnabled) _applyVoiceUI();

init();
</script>
