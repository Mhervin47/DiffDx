<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiffDx — Diagnostic Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/auth.js"></script>
  <style>
    /* ── base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body { overflow: hidden; background: #080810; font-family: 'Noto Sans', sans-serif; }

    /* ── keyframes ── */
    @keyframes dot-pulse    { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1.15)} }
    @keyframes slogan-fade  { from{opacity:0} to{opacity:1} }
    @keyframes bubble-in    { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes live-blink   { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes mic-pulse    { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.35)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
    @keyframes mic-invite-p { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.35);border-color:rgba(16,185,129,.5)} 50%{box-shadow:0 0 0 7px rgba(16,185,129,0);border-color:rgba(16,185,129,.9)} }
    @keyframes loader-pulse { 0%,100%{transform:scale(1);opacity:.9} 50%{transform:scale(1.07);opacity:1} }
    @keyframes speak-bar    { 0%,100%{transform:scaleY(.4)} 50%{transform:scaleY(1)} }
    @keyframes flow-gradient { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }

    /* ── nav ── */
    .nav {
      position: relative;
      display: flex; align-items: center;
      padding: 0 20px; height: 56px;
      background: rgba(8,8,16,.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
    }
    .nav-back-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 9999px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: rgba(148,163,184,.8); font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: all .2s ease;
      white-space: nowrap; flex-shrink: 0;
    }
    .nav-back-pill:hover {
      border-color: rgba(168,85,247,.45);
      background: rgba(168,85,247,.08);
      color: #c084fc;
      box-shadow: 0 0 18px rgba(168,85,247,.2);
    }
    .nav-center-badge {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 7px;
      padding: 7px 20px; border-radius: 9999px;
      background: rgba(16,185,129,.06); border: 1px solid rgba(16,185,129,.18);
      box-shadow: 0 0 24px rgba(16,185,129,.08);
      font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 800;
      letter-spacing: -.02em; color: #f1f5f9;
      pointer-events: none;
    }
    .nav-center-badge span { color: #10b981; }
    .nav-right-cluster {
      margin-left: auto; display: flex; align-items: center; gap: 7px;
      /* keep the right cluster from bleeding into the centered badge */
      max-width: 40%;
    }
    .session-chip {
      display: inline-flex; align-items: center;
      padding: 4px 11px; border-radius: 9999px;
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .02em; white-space: nowrap;
    }
    .chip-dim  { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); color: rgba(148,163,184,.7); }
    .chip-teal { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25); color: #34d399; }
    .chip-green{ background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: #4ede9e; }

    /* ── main layout ── */
    .session-shell {
      display: flex; flex-direction: column;
      height: calc(100vh - 56px);
      overflow: hidden;
    }
    .session-layout {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── left panel ── */
    .session-left {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      min-width: 0;
    }

    .live-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #4ede9e; box-shadow: 0 0 7px rgba(78,222,163,.8);
      animation: live-blink 2s ease-in-out infinite; flex-shrink: 0;
    }

    /* convo scroll */
    .convo-scroll {
      flex: 1; overflow-y: auto; padding: 24px 24px 16px;
    }
    .convo-scroll::-webkit-scrollbar { width: 4px; }
    .convo-scroll::-webkit-scrollbar-track { background: transparent; }
    .convo-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 4px; }
    .convo-scroll > div { margin-bottom: 12px; }
    .convo-scroll > div:last-child { margin-bottom: 0; }

    /* ── bubbles ── */
    .bubble-doctor, .bubble-patient { animation: bubble-in .3s cubic-bezier(.22,.68,0,1.15) both; }

    .bubble-doctor { display: flex; gap: 0; align-items: flex-start; }
    .bubble-doctor-icon { display: none; }
    .bubble-doctor-body {
      max-width: 85%;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-left: 3px solid rgba(16,185,129,.5);
      border-radius: 3px 16px 16px 16px;
      padding: 14px 18px;
      font-size: 15px; line-height: 1.75; color: #e2e8f0;
      word-break: break-word;
    }
    .bubble-doctor-label {
      font-size: 10px; font-weight: 800; letter-spacing: .1em;
      color: rgba(16,185,129,.8); text-transform: uppercase;
      margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .bubble-patient { display: flex; justify-content: flex-end; }
    .bubble-patient-body {
      max-width: 76%;
      background: rgba(168,85,247,.08);
      border: 1px solid rgba(168,85,247,.18);
      border-radius: 16px 3px 16px 16px;
      padding: 12px 18px;
      font-size: 14px; line-height: 1.7; color: #cbd5e1;
      word-break: break-word;
    }

    /* thinking */
    .health-thinking { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
    .health-thinking-dots { display: flex; gap: 5px; flex-shrink: 0; }
    .health-thinking-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(16,185,129,.7);
      animation: dot-pulse .9s ease-in-out infinite;
    }
    .health-thinking-dots span:nth-child(2) { animation-delay: .18s; }
    .health-thinking-dots span:nth-child(3) { animation-delay: .36s; }
    .health-thinking-slogan { font-size: 13px; color: rgba(100,116,139,.8); font-style: italic; animation: slogan-fade .7s ease; }

    /* ── voice controls row ── */
    .voice-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px 0;
      background: rgba(8,8,16,.97);
      flex-shrink: 0;
    }
    .voice-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      border-radius: 9999px; padding: 7px 14px;
      color: rgba(148,163,184,.7); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Sora', sans-serif;
      transition: all .2s ease; white-space: nowrap;
    }
    .voice-toggle:hover {
      border-color: rgba(16,185,129,.4);
      color: #34d399;
      background: rgba(16,185,129,.06);
      box-shadow: 0 0 14px rgba(16,185,129,.15);
    }
    .voice-toggle.active {
      border-color: rgba(16,185,129,.5); color: #10b981;
      background: rgba(16,185,129,.1);
      box-shadow: 0 0 18px rgba(16,185,129,.2);
    }
    .voice-toggle svg { flex-shrink: 0; }

    /* patient mic — violet glow */
    #patient-voice-btn:hover {
      border-color: rgba(168,85,247,.45) !important;
      color: #c084fc !important;
      background: rgba(168,85,247,.08) !important;
      box-shadow: 0 0 14px rgba(168,85,247,.18) !important;
    }
    #patient-voice-btn.active {
      border-color: rgba(168,85,247,.5) !important; color: #a855f7 !important;
      background: rgba(168,85,247,.1) !important;
      box-shadow: 0 0 18px rgba(168,85,247,.2) !important;
    }
    .mic-invite { animation: mic-invite-p 1.1s ease-in-out infinite !important; color: #4ede9e !important; }

    /* voice select */
    .voice-select-wrap { display: flex; align-items: center; gap: 6px; animation: slogan-fade .2s ease; }
    .voice-select-label { font-size: 11px; color: rgba(100,116,139,.8); white-space: nowrap; }
    .voice-select {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      border-radius: 9999px; color: #f1f5f9; font-size: 12px; font-family: 'Sora', sans-serif;
      padding: 5px 12px; cursor: pointer; outline: none;
    }
    .voice-autoplay-wrap { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .voice-autoplay-label { font-size: 11px; color: rgba(100,116,139,.8); white-space: nowrap; }

    /* sarvam badge */
    #sarvam-voice-badge {
      display: none; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600;
      color: #4ede9e; background: rgba(16,185,129,.08);
      border: 1px solid rgba(16,185,129,.22); border-radius: 9999px; padding: 5px 12px;
    }

    /* speaking status */
    #voice-speaking-area { margin-left: auto; }
    .voice-speaking-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: #10b981; font-weight: 600;
      background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.2);
      border-radius: 9999px; padding: 4px 12px;
      animation: slogan-fade .2s ease;
    }
    .speaking-bars { display: flex; align-items: center; gap: 2px; height: 14px; }
    .speaking-bars span {
      display: inline-block; width: 3px; background: #10b981; border-radius: 2px;
      height: 100%; transform-origin: bottom;
      animation: speak-bar .7s ease-in-out infinite;
    }
    .speaking-bars span:nth-child(2) { animation-delay: .12s; height: 70%; }
    .speaking-bars span:nth-child(3) { animation-delay: .24s; }
    .speaking-bars span:nth-child(4) { animation-delay: .36s; height: 55%; }

    /* replay button */
    .tts-replay-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: none; border: none; color: rgba(100,116,139,.6);
      font-size: 10px; cursor: pointer; padding: 2px 6px;
      border-radius: 6px; transition: color .12s; font-family: 'Noto Sans', sans-serif;
    }
    .tts-replay-btn:hover { color: #10b981; }

    /* ── answer bar ── */
    .answer-bar {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 10px 20px 16px;
      background: rgba(8,8,16,.97);
      border-top: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 -12px 40px rgba(0,0,0,.5);
      flex-shrink: 0;
    }
    .mic-btn {
      display: flex; align-items: center; justify-content: center;
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04); color: rgba(148,163,184,.7);
      cursor: pointer; transition: all .18s; flex-shrink: 0;
    }
    .mic-btn:hover {
      border-color: rgba(16,185,129,.5); color: #10b981;
      background: rgba(16,185,129,.08);
      box-shadow: 0 0 16px rgba(16,185,129,.2);
    }
    .mic-btn.recording {
      border-color: rgba(239,68,68,.7); color: #f87171;
      background: rgba(239,68,68,.12);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    .answer-textarea {
      flex: 1; background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 22px; color: #f1f5f9;
      font-family: 'Noto Sans', sans-serif; font-size: 14px; line-height: 1.6;
      padding: 10px 20px; resize: none; outline: none;
      transition: border-color .2s, box-shadow .2s;
      min-height: 42px; max-height: 130px;
    }
    .answer-textarea:focus {
      border-color: rgba(16,185,129,.5);
      box-shadow: 0 0 0 3px rgba(16,185,129,.08), inset 0 0 0 1px rgba(16,185,129,.12);
    }
    .answer-textarea::placeholder { color: rgba(148,163,184,.45); }
    #send-btn {
      height: 42px; padding: 0 22px; border-radius: 9999px;
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 13px;
      letter-spacing: .02em; border: none; cursor: pointer;
      background: linear-gradient(135deg, #059669 0%, #10b981 60%, #34d399 100%);
      color: #021a12;
      box-shadow: 0 4px 18px rgba(16,185,129,.35), 0 0 40px rgba(16,185,129,.12);
      transition: box-shadow .2s, transform .15s;
      display: inline-flex; align-items: center; gap: 7px;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) {
      box-shadow: 0 6px 28px rgba(16,185,129,.55), 0 0 60px rgba(16,185,129,.22);
      transform: translateY(-2px);
    }
    #send-btn:active:not(:disabled) { transform: translateY(0); }
    #send-btn:disabled { opacity: .4; box-shadow: none; cursor: not-allowed; }

    /* tap-to-hear banner */
    #tap-to-hear-banner {
      position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(12px);
      display: flex; align-items: center; gap: 11px;
      background: rgba(10,12,26,.88); border: 1px solid rgba(16,185,129,.3);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      color: #e2e8f0; padding: 13px 22px 13px 16px;
      border-radius: 16px; font-size: 13px; font-weight: 600;
      font-family: 'Sora', sans-serif; z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(16,185,129,.08);
      opacity: 0; animation: tap-banner-in .3s ease forwards;
      cursor: default; pointer-events: none; white-space: nowrap;
    }
    #tap-to-hear-banner .tap-icon-wrap {
      width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
      background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.25);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    #tap-to-hear-banner .tap-icon-wrap::before {
      content: ''; position: absolute; inset: -4px; border-radius: 14px;
      border: 1px solid rgba(16,185,129,.2);
      animation: tap-ring 1.8s ease-in-out infinite;
    }
    #tap-to-hear-banner .tap-text { line-height: 1.3; }
    #tap-to-hear-banner .tap-text strong { display: block; color: #f1f5f9; font-size: 13px; }
    #tap-to-hear-banner .tap-text span { font-size: 11px; font-weight: 500; color: rgba(148,163,184,.7); }
    @keyframes tap-banner-in {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes tap-ring {
      0%,100% { transform: scale(1); opacity: .5; }
      50%      { transform: scale(1.15); opacity: 0; }
    }

    /* complete banner */
    .complete-banner {
      margin: 12px 20px;
      background: rgba(78,222,163,.07);
      border: 1px solid rgba(78,222,163,.22);
      border-radius: 16px; padding: 18px 22px; text-align: center;
    }
    .complete-banner-title {
      font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 800; color: #4ede9e; margin-bottom: 12px;
    }
    .btn-view-report {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 11px 28px; border-radius: 9999px; border: none; cursor: pointer;
      font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700;
      background: linear-gradient(135deg, #059669 0%, #10b981 60%, #34d399 100%);
      color: #021a12;
      box-shadow: 0 4px 18px rgba(16,185,129,.4);
      transition: box-shadow .2s, transform .15s;
    }
    .btn-view-report:hover {
      box-shadow: 0 6px 28px rgba(16,185,129,.6);
      transform: translateY(-2px);
    }

    /* ── right panel ── */
    .session-right {
      width: 340px; flex-shrink: 0;
      background: rgba(0,0,0,.2);
      border-left: 1px solid rgba(255,255,255,.06);
      padding: 20px 18px;
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .session-right::-webkit-scrollbar { width: 4px; }
    .session-right::-webkit-scrollbar-track { background: transparent; }
    .session-right::-webkit-scrollbar-thumb { background: rgba(255,255,255,.07); border-radius: 4px; }

    /* chief complaint block (right panel) */
    .complaint-block {
      background: rgba(16,185,129,.05);
      border: 1px solid rgba(16,185,129,.15);
      border-radius: 14px; padding: 14px 16px;
      margin-bottom: 18px;
    }
    .complaint-label {
      font-family: 'Sora', sans-serif;
      font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(16,185,129,.7); margin-bottom: 6px;
      display: flex; align-items: center; gap: 7px;
    }
    .complaint-text {
      font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 700; color: #f1f5f9;
      letter-spacing: -.02em; line-height: 1.3;
    }

    .diff-header {
      font-family: 'Sora', sans-serif;
      font-size: 10px; font-weight: 800; letter-spacing: .12em;
      text-transform: uppercase; color: rgba(100,116,139,.7); margin-bottom: 14px;
    }
    .diff-list { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .diff-item-top {
      background: rgba(16,185,129,.06);
      border: 1px solid rgba(16,185,129,.2);
      border-radius: 12px; padding: 11px 14px;
      box-shadow: 0 0 20px rgba(16,185,129,.06);
    }
    .diff-item-rest { padding: 3px 2px; }
    .diff-bar-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .diff-bar-name { font-size: 13px; color: #cbd5e1; font-family: 'Noto Sans', sans-serif; }
    .diff-bar-prob { font-size: 12px; font-weight: 700; color: rgba(100,116,139,.9); font-family: 'Sora', sans-serif; }
    .diff-bar-track { height: 4px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
    .diff-bar-fill  { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #a855f7, #c084fc); transition: width .5s cubic-bezier(.4,0,.2,1); }
    .top-dx .diff-bar-fill { background: linear-gradient(90deg, #059669, #10b981, #34d399); box-shadow: 0 0 8px rgba(16,185,129,.35); }

    .confidence-section {
      border-top: 1px solid rgba(255,255,255,.06);
      padding-top: 16px; margin-top: 16px;
    }
    .conf-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
    .conf-label {
      font-family: 'Sora', sans-serif;
      font-size: 10px; font-weight: 800; letter-spacing: .1em;
      text-transform: uppercase; color: rgba(100,116,139,.8);
    }
    .conf-val {
      font-family: 'Sora', sans-serif;
      font-size: 24px; font-weight: 900;
      background: linear-gradient(135deg, #10b981, #34d399);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -.04em;
    }
    .conf-track { height: 4px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
    .conf-fill  { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #059669, #10b981, #34d399); transition: width .6s cubic-bezier(.4,0,.2,1); }

    .session-meta {
      border-top: 1px solid rgba(255,255,255,.05);
      padding-top: 12px; margin-top: 14px;
      font-size: 11px; color: rgba(100,116,139,.6);
      display: flex; flex-direction: column; gap: 4px;
    }

    /* ── loader ── */
    #session-loader {
      position: fixed; inset: 0; z-index: 999;
      background: #080810;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity .4s ease;
    }
    .loader-icon {
      width: 68px; height: 68px; margin-bottom: 28px;
      display: flex; align-items: center; justify-content: center; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(16,185,129,.2), transparent 70%);
      box-shadow: 0 0 50px rgba(16,185,129,.1);
      animation: loader-pulse 2s ease-in-out infinite;
    }
    .loader-title {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(90deg, #10b981, #34d399, #a855f7, #10b981);
      background-size: 300% 100%;
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: flow-gradient 3s linear infinite;
      font-size: 22px; font-weight: 900; margin-bottom: 8px; letter-spacing: -.02em;
    }
    .loader-tip { font-size: 13px; color: rgba(100,116,139,.9); font-style: italic; max-width: 340px; text-align: center; line-height: 1.6; min-height: 44px; animation: slogan-fade .6s ease; }
    .loader-bar-track { width: 180px; height: 2px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; margin-top: 28px; }
    .loader-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #10b981, #34d399, #a855f7); width: 0%; transition: width .4s ease; }
    .loader-dots { display: flex; gap: 7px; margin-top: 18px; }
    .loader-dots span { width: 7px; height: 7px; border-radius: 50%; background: #10b981; opacity: .25; animation: dot-pulse .9s ease-in-out infinite; }
    .loader-dots span:nth-child(2) { animation-delay: .18s; }
    .loader-dots span:nth-child(3) { animation-delay: .36s; }

    /* critique */
    .turn-critique {
      background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px; padding: 10px 14px;
    }
    .turn-critique-header {
      font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(100,116,139,.7); margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px; font-family: 'Sora', sans-serif;
    }
    .score-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .score-bar-label { font-size: 11px; color: rgba(100,116,139,.8); width: 72px; flex-shrink: 0; }
    .score-bar-track { flex: 1; height: 4px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
    .score-bar-val { font-size: 11px; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; font-family: 'Sora', sans-serif; }
    .would-have-asked {
      font-size: 11px; color: rgba(148,163,184,.6); font-style: italic;
      margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,.05);
    }
    .badge-amber { background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.3); color: #fbbf24; border-radius: 99px; padding: 2px 8px; }
  </style>
</head>
<body>

<!-- loader -->
<div id="session-loader">
  <div class="loader-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
    </svg>
  </div>
  <div class="loader-title">DiffDx</div>
  <div class="loader-tip" id="loader-tip">Preparing your diagnostic session…</div>
  <div class="loader-bar-track"><div class="loader-bar-fill" id="loader-bar"></div></div>
  <div class="loader-dots"><span></span><span></span><span></span></div>
</div>

<!-- nav -->
<nav class="nav">
  <a class="nav-back-pill" onclick="window.location.href='/history'">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    History
  </a>

  <div class="nav-center-badge">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
    </svg>
    Diff<span>Dx</span>
  </div>

  <div class="nav-right-cluster">
    <span id="turn-chip" class="session-chip chip-teal">Turn 0</span>
    <span id="status-chip" class="session-chip chip-dim">Starting…</span>
    <div id="nav-auth" style="display:flex;align-items:center;gap:6px;margin-left:6px;"></div>
  </div>
</nav>

<!-- main -->
<div class="session-shell">
  <div class="session-layout">

    <!-- LEFT: conversation -->
    <div class="session-left">

      <div class="convo-scroll" id="convo-scroll"></div>
      <div id="complete-area"></div>

      <!-- voice controls above input -->
      <div class="voice-bar" id="voice-bar">
        <button class="voice-toggle" id="voice-toggle-btn" onclick="toggleVoice()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          Doctor Voice
        </button>

        <div class="voice-select-wrap" id="voice-select-wrap" style="display:none;">
          <span class="voice-select-label">Voice:</span>
          <select class="voice-select" id="voice-select" onchange="onVoiceChange(this.value)">
            <option value="">Loading…</option>
          </select>
          <div class="voice-autoplay-wrap">
            <input type="checkbox" id="voice-autoplay" checked onchange="onAutoplayChange(this.checked)" style="accent-color:#10b981;cursor:pointer;">
            <label class="voice-autoplay-label" for="voice-autoplay">Auto-play</label>
          </div>
        </div>

        <div id="sarvam-voice-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <span id="sarvam-lang-label"></span>
        </div>

        <button class="voice-toggle" id="patient-voice-btn" onclick="togglePatientVoice()" title="Enable interactive voice mode" style="display:none;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          Patient Mic
        </button>

        <div id="voice-speaking-area"></div>
      </div>

      <!-- answer bar -->
      <div class="answer-bar" id="answer-bar">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Speak your answer" style="display:none;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <textarea class="answer-textarea" id="answer-input"
          placeholder="Type your answer here…" rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendAnswer()" title="Send (Enter)">
          Send
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

    <!-- RIGHT: live differential -->
    <div class="session-right">
      <!-- chief complaint context block -->
      <div class="complaint-block" id="complaint-block">
        <div class="complaint-label">
          <span class="live-dot" id="live-dot"></span>
          Chief Complaint
        </div>
        <div class="complaint-text" id="complaint-header">Loading…</div>
        <div id="session-status-row" style="display:none;"></div>
      </div>

      <div class="diff-header">Live Differential</div>
      <div class="diff-list" id="diff-list">
        <div style="display:flex;align-items:center;gap:8px;color:rgba(100,116,139,.6);font-size:13px;padding:8px 0;">
          <div class="spinner" style="width:14px;height:14px;"></div> Awaiting first turn…
        </div>
      </div>
      <div class="confidence-section">
        <div class="conf-row">
          <span class="conf-label">Confidence to Stop</span>
          <span class="conf-val" id="conf-val">0.00</span>
        </div>
        <div class="conf-track"><div class="conf-fill" id="conf-fill" style="width:0%"></div></div>
        <div class="session-meta" id="session-meta"></div>
      </div>
    </div>

  </div>
</div>

<script>
const API = '';
let sessionId = sessionStorage.getItem('sessionId');
let startData = JSON.parse(sessionStorage.getItem('sessionStart') || 'null');

if (!sessionId || !startData) {
  sessionId = localStorage.getItem('activeSessionId');
  startData = JSON.parse(localStorage.getItem('activeSessionStart') || 'null');
  if (sessionId && startData) {
    sessionStorage.setItem('sessionId', sessionId);
    sessionStorage.setItem('sessionStart', JSON.stringify(startData));
  }
}

if (!sessionId || !startData) window.location.href = '/';

function _clearActiveSession() {
  localStorage.removeItem('activeSessionId');
  localStorage.removeItem('activeSessionStart');
}

let turnCount = 0;
let sessionComplete = false;
let currentQuestion = '';
const _sessionLang = startData?.session_language || localStorage.getItem('sessionLanguage') || 'en-IN';
const _isIndianLang = _sessionLang !== 'en-IN';
console.log('[Lang] session_language =', _sessionLang, '| _isIndianLang =', _isIndianLang);

// ---- Loader ----
let _loaderPct = 0;
const _tipMessages = ['Preparing your diagnostic session…', 'Loading differential engine…', 'Almost ready…'];
let _tipIdx = 0;
function _advanceLoader() {
  _loaderPct = Math.min(_loaderPct + 35, 90);
  const bar = document.getElementById('loader-bar');
  const tip = document.getElementById('loader-tip');
  if (bar) bar.style.width = _loaderPct + '%';
  if (tip && _tipIdx < _tipMessages.length - 1) { _tipIdx++; tip.textContent = _tipMessages[_tipIdx]; }
}
function _finishLoader() {
  const bar = document.getElementById('loader-bar');
  if (bar) bar.style.width = '100%';
  setTimeout(() => {
    const el = document.getElementById('session-loader');
    if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
  }, 300);
}
setTimeout(_advanceLoader, 400);

// ---- Init ----
function init() {
  _advanceLoader();
  const complaint = startData.chief_complaint || '';
  document.getElementById('complaint-header').textContent = complaint || '…';

  const _langNames = {'hi-IN':'Hindi','ta-IN':'Tamil','te-IN':'Telugu','kn-IN':'Kannada','ml-IN':'Malayalam','bn-IN':'Bengali','mr-IN':'Marathi','gu-IN':'Gujarati','pa-IN':'Punjabi'};
  const _langLabel = _isIndianLang ? ` · ${_langNames[_sessionLang] || _sessionLang}` : '';
  document.getElementById('session-meta').innerHTML =
    `<span>Session ID: ${sessionId.slice(0,8)}…${_langLabel}</span>`;

  updateDifferential(startData.differential || []);
  updateConfidence(startData.confidence_to_stop || 0);

  const scroll = document.getElementById('convo-scroll');
  scroll.innerHTML = '';
  appendDoctorBubble(startData.doctor_question, null);
  currentQuestion = startData.doctor_question;
  setTurnChip(0, startData.differential?.length > 0);

  _finishLoader();
}

// ---- Sending an answer ----
async function sendAnswer() {
  if (sessionComplete) return;
  const input = document.getElementById('answer-input');
  const answer = input.value.trim();
  if (!answer) return;

  if (typeof stopSpeaking === 'function') stopSpeaking();
  if (typeof _clearMicPrompt === 'function') _clearMicPrompt();
  input.value = '';
  autoResize(input);
  setInputEnabled(false);

  appendPatientBubble(answer);
  const thinkId = appendThinking();

  try {
    const res = await fetch(`${API}/api/session/${sessionId}/turn`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ patient_answer: answer }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    removeThinking(thinkId);
    turnCount++;
    setTurnChip(turnCount, true);

    if (data.critique) appendCritique(data.critique);

    updateDifferential(data.differential || []);
    updateConfidence(data.confidence_to_stop || 0);

    if (data.session_complete) {
      sessionComplete = true;
      _clearActiveSession();
      setStatusChip('Complete', 'chip-green');
      if (typeof stopSpeaking === 'function') stopSpeaking();
      showCompleteArea(data.termination_reason);
      setInputEnabled(false);
      hideAnswerBar();
    } else {
      appendDoctorBubble(data.doctor_question, null);
      currentQuestion = data.doctor_question;
      setInputEnabled(true);
    }
  } catch (e) {
    removeThinking(thinkId);
    appendError(`API error: ${e.message}`);
    setInputEnabled(true);
  }
}

// ---- DOM helpers ----
function appendDoctorBubble(question, critiqueData) {
  if (!question) return;
  const scroll   = document.getElementById('convo-scroll');
  const div      = document.createElement('div');
  const bubbleId = `bubble-${Date.now()}`;
  div.innerHTML = `
    <div class="bubble-doctor">
      <div class="bubble-doctor-icon"></div>
      <div class="bubble-doctor-body">
        <div class="bubble-doctor-label">
          Doctor
          <button class="tts-replay-btn" id="${bubbleId}-replay" onclick="_replayBubble('${bubbleId}')" title="Read aloud" style="display:none;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            Play
          </button>
        </div>
        <span id="${bubbleId}-text">${escHtml(question)}</span>
      </div>
    </div>
  `;
  scroll.appendChild(div);
  scrollToBottom();

  const replayBtn    = document.getElementById(`${bubbleId}-replay`);
  const bubbleTextEl = document.getElementById(`${bubbleId}-text`);
  if (_isIndianLang) {
    if (replayBtn) replayBtn.style.display = 'inline-flex';
    speakQuestion(question, bubbleTextEl);
  } else if (typeof _voiceEnabled !== 'undefined' && _voiceEnabled) {
    if (replayBtn) replayBtn.style.display = 'inline-flex';
    if (_autoplay) speakQuestion(question, bubbleTextEl);
  }
}

function appendPatientBubble(answer) {
  const scroll = document.getElementById('convo-scroll');
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="bubble-patient">
      <div class="bubble-patient-body">${escHtml(answer)}</div>
    </div>
  `;
  scroll.appendChild(div);
  scrollToBottom();
}

function appendCritique(c) {
  const scroll = document.getElementById('convo-scroll');
  const qColor = scoreColor(c.question_quality_score);
  const dColor = scoreColor(c.differential_quality_score);
  const rColor = scoreColor(c.reasoning_quality_score);
  const weakBadge = c.weakness_category && c.weakness_category !== 'other'
    ? `<span class="badge-amber" style="font-size:10px;">${c.weakness_category.replace(/_/g,' ')}</span>`
    : '';
  const wha = c.would_have_asked && c.question_quality_score < 0.7
    ? `<div class="would-have-asked">Would have asked: "${escHtml(c.would_have_asked)}"</div>`
    : '';
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="turn-critique">
      <div class="turn-critique-header">Critic Score ${weakBadge}</div>
      ${scoreBar('Q-Quality', c.question_quality_score, qColor)}
      ${scoreBar('Diff', c.differential_quality_score, dColor)}
      ${scoreBar('Reasoning', c.reasoning_quality_score, rColor)}
      ${wha}
    </div>
  `;
  scroll.appendChild(div);
  scrollToBottom();
}

function scoreBar(label, val, color) {
  const pct = Math.round((val ?? 0) * 100);
  return `
    <div class="score-bar-row">
      <span class="score-bar-label">${label}</span>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="score-bar-val" style="color:${color}">${val?.toFixed(2) ?? '—'}</span>
    </div>`;
}

function scoreColor(v) {
  if (v == null) return 'rgba(100,116,139,.8)';
  if (v >= 0.7) return '#10b981';
  if (v >= 0.5) return '#f59e0b';
  return '#ef4444';
}

const _HEALTH_SLOGANS = [
  "An apple a day keeps the doctor away.",
  "Early diagnosis is the best medicine.",
  "Your health is your greatest wealth.",
  "Prevention is better than cure.",
  "Listen to your body — it knows best.",
  "A good laugh and a long sleep are the best cures.",
  "Take care of your body. It's the only place you have to live.",
  "The groundwork of all happiness is health.",
  "He who has health has hope; he who has hope has everything.",
  "Walking is the best medicine.",
  "Let food be thy medicine and medicine be thy food.",
  "Sleep is the golden chain that ties health and our bodies together.",
  "Good health is not something we can buy. However, it can be an investment.",
  "The first wealth is health.",
  "A healthy outside starts from the inside.",
];

let thinkCounter = 0;
const _thinkTimers = {};

function appendThinking() {
  const id = `think-${++thinkCounter}`;
  const scroll = document.getElementById('convo-scroll');
  const div = document.createElement('div');
  div.id = id;
  div.className = 'health-thinking';
  div.innerHTML = `
    <div class="health-thinking-dots"><span></span><span></span><span></span></div>
    <div class="health-thinking-slogan" id="${id}-slogan">${_HEALTH_SLOGANS[0]}</div>
  `;
  scroll.appendChild(div);
  scrollToBottom();

  let idx = Math.floor(Math.random() * _HEALTH_SLOGANS.length);
  _thinkTimers[id] = setInterval(() => {
    const el = document.getElementById(`${id}-slogan`);
    if (!el) { clearInterval(_thinkTimers[id]); return; }
    idx = (idx + 1) % _HEALTH_SLOGANS.length;
    el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
    el.textContent = _HEALTH_SLOGANS[idx];
  }, 900);
  return id;
}

function removeThinking(id) {
  clearInterval(_thinkTimers[id]); delete _thinkTimers[id];
  document.getElementById(id)?.remove();
}

function appendError(msg) {
  const scroll = document.getElementById('convo-scroll');
  const div = document.createElement('div');
  div.innerHTML = `<div style="color:#f87171;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px 14px;font-size:13px;margin:4px 0;">${escHtml(msg)}</div>`;
  scroll.appendChild(div);
  scrollToBottom();
}

function updateDifferential(diff) {
  const list = document.getElementById('diff-list');
  if (!diff || diff.length === 0) return;
  list.innerHTML = diff.map((d, i) => {
    const pct  = Math.round((d.prob ?? 0) * 100);
    const isTop = i === 0;
    return `
    <div class="${isTop ? 'diff-item-top' : 'diff-item-rest'}">
      <div class="diff-bar-row${isTop ? ' top-dx' : ''}">
        <div class="diff-bar-header">
          <span class="diff-bar-name" style="${isTop ? 'font-weight:700;color:#f1f5f9;' : ''}">${i + 1}. ${escHtml(d.dx)}</span>
          <span class="diff-bar-prob" style="${isTop ? 'color:#10b981;font-weight:800;' : ''}">${pct}%</span>
        </div>
        <div class="diff-bar-track">
          <div class="diff-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateConfidence(val) {
  const pct = Math.round((val ?? 0) * 100);
  document.getElementById('conf-val').textContent = (val ?? 0).toFixed(2);
  document.getElementById('conf-fill').style.width = `${pct}%`;
}

function setTurnChip(n, active) {
  const chip = document.getElementById('turn-chip');
  chip.textContent = `Turn ${n}`;
  chip.className = `session-chip ${active ? 'chip-teal' : 'chip-dim'}`;
  if (!active) setStatusChip('Initializing', 'chip-dim');
  else setStatusChip('Active', 'chip-teal');
}

function setStatusChip(text, cls) {
  const chip = document.getElementById('status-chip');
  chip.textContent = text;
  chip.className = `session-chip ${cls}`;
}

function showCompleteArea(reason) {
  const area = document.getElementById('complete-area');
  area.innerHTML = `
    <div class="complete-banner">
      <div class="complete-banner-title">Session Complete</div>
      <button class="btn-view-report" onclick="viewReport()">
        View Full Report
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  `;
  const dot = document.getElementById('live-dot');
  if (dot) { dot.style.background = 'rgba(100,116,139,.5)'; dot.style.boxShadow = 'none'; dot.style.animation = 'none'; }
}

function hideAnswerBar() {
  document.getElementById('answer-bar').style.display = 'none';
  document.getElementById('voice-bar').style.display = 'none';
}

function setInputEnabled(enabled) {
  document.getElementById('answer-input').disabled = !enabled;
  document.getElementById('send-btn').disabled = !enabled;
}

function scrollToBottom() {
  const s = document.getElementById('convo-scroll');
  s.scrollTop = s.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAnswer(); }
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function viewReport() { window.location.href = '/report.html'; }

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =====================================================================
// Voice — Browser SpeechSynthesis (TTS) + SpeechRecognition (STT)
// =====================================================================
const _VOICE_KEY         = 'voice_enabled_v1';
const _VOICE_URI_KEY     = 'voice_uri_v1';
const _VOICE_AUTO_KEY    = 'voice_autoplay_v1';
const _PATIENT_VOICE_KEY = 'patient_voice_enabled_v1';

let _voiceEnabled        = _isIndianLang || localStorage.getItem(_VOICE_KEY) === '1';
let _selectedVoiceURI    = localStorage.getItem(_VOICE_URI_KEY) || '';
let _autoplay            = localStorage.getItem(_VOICE_AUTO_KEY) !== '0';
let _isSpeaking          = false;
let _patientVoiceEnabled = _isIndianLang || localStorage.getItem(_PATIENT_VOICE_KEY) === '1';

const _SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let _recognition = null;
let _isRecording = false;

let _voicesPopulated = false;
function _loadVoices() {
  const sel = document.getElementById('voice-select');
  if (!sel) return;
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  if (!voices.length) return;
  if (!_voicesPopulated) {
    sel.innerHTML = voices.map(v =>
      `<option value="${v.voiceURI}">${v.name}${v.localService ? '' : ' ☁'}</option>`
    ).join('');
    _voicesPopulated = true;
  }
  if (!_selectedVoiceURI || !voices.find(v => v.voiceURI === _selectedVoiceURI)) {
    _selectedVoiceURI = voices[0].voiceURI;
    localStorage.setItem(_VOICE_URI_KEY, _selectedVoiceURI);
  }
  sel.value = _selectedVoiceURI;
}
window.speechSynthesis.onvoiceschanged = _loadVoices;

const _LANG_NAMES = {
  'hi-IN':'Hindi','ta-IN':'Tamil','te-IN':'Telugu','kn-IN':'Kannada',
  'ml-IN':'Malayalam','bn-IN':'Bengali','mr-IN':'Marathi','gu-IN':'Gujarati','pa-IN':'Punjabi',
};

function _applyVoiceUI() {
  const btn             = document.getElementById('voice-toggle-btn');
  const wrap            = document.getElementById('voice-select-wrap');
  const micBtn          = document.getElementById('mic-btn');
  const patientVoiceBtn = document.getElementById('patient-voice-btn');
  const sarvamBadge     = document.getElementById('sarvam-voice-badge');
  const sarvamLabel     = document.getElementById('sarvam-lang-label');

  if (_isIndianLang) {
    btn.classList.add('active');
    btn.style.pointerEvents = 'none';
    wrap.style.display = 'none';
    if (sarvamBadge) sarvamBadge.style.display = 'flex';
    if (sarvamLabel) sarvamLabel.textContent = _LANG_NAMES[_sessionLang] || _sessionLang;
    if (_SR && micBtn) micBtn.style.display = 'flex';
    if (_SR && patientVoiceBtn) {
      patientVoiceBtn.style.display = 'inline-flex';
      if (_patientVoiceEnabled) patientVoiceBtn.classList.add('active');
      else patientVoiceBtn.classList.remove('active');
    }
    return;
  }

  if (sarvamBadge) sarvamBadge.style.display = 'none';

  // Mic button is always visible when SpeechRecognition is supported — independent of TTS toggle
  if (_SR && micBtn) micBtn.style.display = 'flex';

  if (_voiceEnabled) {
    btn.classList.add('active');
    wrap.style.display = 'flex';
    if (_SR && patientVoiceBtn) {
      patientVoiceBtn.style.display = 'inline-flex';
      if (_patientVoiceEnabled) patientVoiceBtn.classList.add('active');
      else patientVoiceBtn.classList.remove('active');
    }
    document.getElementById('voice-autoplay').checked = _autoplay;
    _loadVoices();
  } else {
    btn.classList.remove('active');
    wrap.style.display = 'none';
    if (patientVoiceBtn) { patientVoiceBtn.style.display = 'none'; patientVoiceBtn.classList.remove('active'); }
    _patientVoiceEnabled = false;
    localStorage.setItem(_PATIENT_VOICE_KEY, '0');
    stopSpeaking();
  }
}

function togglePatientVoice() {
  if (!_SR) { alert('Speech recognition is not supported in this browser. Please use Chrome or Edge.'); return; }
  _patientVoiceEnabled = !_patientVoiceEnabled;
  localStorage.setItem(_PATIENT_VOICE_KEY, _patientVoiceEnabled ? '1' : '0');
  const btn = document.getElementById('patient-voice-btn');
  if (btn) {
    if (_patientVoiceEnabled) btn.classList.add('active');
    else btn.classList.remove('active');
  }
}

function toggleVoice() {
  _voiceEnabled = !_voiceEnabled;
  localStorage.setItem(_VOICE_KEY, _voiceEnabled ? '1' : '0');
  _applyVoiceUI();
  document.querySelectorAll('.tts-replay-btn').forEach(b => {
    b.style.display = _voiceEnabled ? 'inline-flex' : 'none';
  });
}

function onVoiceChange(val) { _selectedVoiceURI = val; localStorage.setItem(_VOICE_URI_KEY, val); }
function onAutoplayChange(val) { _autoplay = val; localStorage.setItem(_VOICE_AUTO_KEY, val ? '1' : '0'); }

async function speakQuestion(text, bubbleTextEl) {
  if (!text) return;
  if (_isIndianLang) await _sarvamSpeak(text, _sessionLang, bubbleTextEl);
  else if (_voiceEnabled) speakText(text);
}

let _userInteracted  = false;
let _prefetchedAudio = null;

async function _prefetchSarvamAudio(text, lang, bubbleTextEl) {
  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, lang }),
    });
    if (!res.ok) return;
    const { audio_b64, translated_text } = await res.json();
    const binary = atob(audio_b64);
    const buf = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) buf[i] = binary.charCodeAt(i);
    const blob = new Blob([buf], { type: 'audio/wav' });
    const url  = URL.createObjectURL(blob);
    _prefetchedAudio = { url, translated_text, bubbleTextEl };
    if (translated_text && bubbleTextEl) bubbleTextEl.textContent = translated_text;
    console.log('[Sarvam] prefetch done — translated:', translated_text?.slice(0, 40));
    if (_userInteracted) _playPrefetched();
    else _showTapToHear();
  } catch (e) { console.warn('Sarvam prefetch failed:', e); }
}

function _playPrefetched() {
  if (!_prefetchedAudio) return;
  const { url, bubbleTextEl } = _prefetchedAudio;
  _prefetchedAudio = null;
  _hideTapToHear();
  const audio = new Audio(url);
  audio.onended = () => {
    _setSpeakingUI(false);
    URL.revokeObjectURL(url);
    if (_SR && _patientVoiceEnabled && !_isRecording) setTimeout(_autoStartPatientMic, 300);
  };
  audio.onerror = () => { _setSpeakingUI(false); URL.revokeObjectURL(url); };
  _setSpeakingUI(true);
  audio.play().catch(() => _setSpeakingUI(false));
}

function _unlockAudio() {
  if (_userInteracted) return;
  _userInteracted = true;
  document.removeEventListener('click',   _unlockAudio);
  document.removeEventListener('keydown', _unlockAudio);
  if (_prefetchedAudio) _playPrefetched();
}
document.addEventListener('click',   _unlockAudio);
document.addEventListener('keydown', _unlockAudio);

async function _sarvamSpeak(text, lang, bubbleTextEl) {
  _prefetchSarvamAudio(text, lang, bubbleTextEl);
  if (!_userInteracted) _showTapToHear();
}

function _showTapToHear() {
  if (document.getElementById('tap-to-hear-banner')) return;
  const el = document.createElement('div');
  el.id = 'tap-to-hear-banner';
  el.innerHTML = `
    <div class="tap-icon-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </div>
    <div class="tap-text">
      <strong>Tap anywhere to hear</strong>
      <span>Audio will play after your first interaction</span>
    </div>`;
  document.body.appendChild(el);
}
function _hideTapToHear() { document.getElementById('tap-to-hear-banner')?.remove(); }

function _promptMicTap() {
  if (!_SR) return;
  const input      = document.getElementById('answer-input');
  const patientBtn = document.getElementById('patient-voice-btn');
  if (!input) return;
  _clearMicPrompt();
  const langName = _LANG_NAMES[_sessionLang] || _sessionLang || 'your language';
  input.placeholder = `Tap here to speak in ${langName}…`;
  if (patientBtn) patientBtn.classList.add('mic-invite');
  const handler = () => { _clearMicPrompt(); _autoStartPatientMic(); };
  input._micPromptHandler = handler;
  input.addEventListener('click', handler, { once: true });
}

function _clearMicPrompt() {
  const input      = document.getElementById('answer-input');
  const patientBtn = document.getElementById('patient-voice-btn');
  if (input) {
    if (input._micPromptHandler) { input.removeEventListener('click', input._micPromptHandler); input._micPromptHandler = null; }
    input.placeholder = 'Type your answer here…';
  }
  if (patientBtn) patientBtn.classList.remove('mic-invite');
}

function speakText(text) {
  if (!_voiceEnabled || !text) return;
  stopSpeaking();
  const voices = window.speechSynthesis.getVoices();
  const voice  = voices.find(v => v.voiceURI === _selectedVoiceURI) || voices.find(v => v.lang.startsWith('en')) || null;
  const utt    = new SpeechSynthesisUtterance(text);
  if (voice) utt.voice = voice;
  utt.rate = 0.95; utt.pitch = 1.0; utt.volume = 1.0;
  utt.onstart = () => _setSpeakingUI(true);
  utt.onend   = () => {
    _setSpeakingUI(false);
    if (_patientVoiceEnabled && _SR && !_isRecording) setTimeout(_autoStartPatientMic, 300);
  };
  utt.onerror = () => _setSpeakingUI(false);
  window.speechSynthesis.speak(utt);
}

function stopSpeaking() { window.speechSynthesis.cancel(); _setSpeakingUI(false); }

function _setSpeakingUI(speaking) {
  _isSpeaking = speaking;
  const area = document.getElementById('voice-speaking-area');
  if (!area) return;
  area.innerHTML = speaking
    ? `<div class="voice-speaking-badge"><div class="speaking-bars"><span></span><span></span><span></span><span></span></div> Speaking…<button onclick="stopSpeaking()" style="background:none;border:none;color:rgba(100,116,139,.6);cursor:pointer;font-size:11px;margin-left:6px;font-family:Sora,sans-serif;" title="Stop">✕</button></div>`
    : '';
}

function toggleMic() {
  if (!_SR) { alert('Speech recognition is not supported in this browser. Please use Chrome or Edge.'); return; }
  if (_isRecording) _recognition?.stop();
  else _startRecognition();
}

function _startRecognition() {
  _recognition = new _SR();
  _recognition.lang = _sessionLang || 'en-US';
  _recognition.interimResults = true;
  _recognition.continuous = false;

  const micBtn   = document.getElementById('mic-btn');
  const input    = document.getElementById('answer-input');
  const existing = input.value.trim();

  _recognition.onstart = () => {
    _isRecording = true;
    micBtn.classList.add('recording');
    micBtn.title = 'Recording… click to stop';
    stopSpeaking();
  };
  _recognition.onresult = (e) => {
    let interim = '', final = '';
    for (const r of e.results) { if (r.isFinal) final += r[0].transcript; else interim += r[0].transcript; }
    input.value = (existing ? existing + ' ' : '') + (final || interim);
    autoResize(input);
  };
  _recognition.onerror = (e) => {
    console.warn('STT error:', e.error);
    _stopRecognitionUI();
    if (e.error === 'not-allowed' || e.error === 'permission-denied') {
      _showMicError('Microphone access was denied. Click the 🔒 icon in your browser address bar and allow microphone access, then try again.');
    } else if (e.error === 'audio-capture') {
      _showMicError('No microphone found. Please connect a microphone and try again.');
    } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
      _showMicError(`Microphone error: ${e.error}`);
    }
  };
  _recognition.onend   = () => {
    _stopRecognitionUI();
    if (_patientVoiceEnabled) {
      const input = document.getElementById('answer-input');
      if (input && input.value.trim()) setTimeout(() => sendAnswer(), 400);
    }
  };
  _recognition.start();
}

function _showMicError(msg) {
  const area = document.getElementById('voice-speaking-area');
  if (!area) { alert(msg); return; }
  area.innerHTML = `<div class="voice-speaking-badge" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#ef4444;">${msg}</div>`;
  setTimeout(() => { if (area.innerHTML.includes(msg)) area.innerHTML = ''; }, 6000);
}

function _stopRecognitionUI() {
  _isRecording = false;
  const micBtn = document.getElementById('mic-btn');
  if (micBtn) { micBtn.classList.remove('recording'); micBtn.title = 'Speak your answer'; }
  _setListeningUI(false);
}

function _setListeningUI(active) {
  const area = document.getElementById('voice-speaking-area');
  if (!area) return;
  if (active) {
    area.innerHTML = `<div class="voice-speaking-badge" style="background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#4ede9e"><div class="speaking-bars"><span style="background:#4ede9e"></span><span style="background:#4ede9e"></span><span style="background:#4ede9e"></span><span style="background:#4ede9e"></span></div> Listening…<button onclick="_recognition?.stop()" style="background:none;border:none;color:rgba(100,116,139,.6);cursor:pointer;font-size:11px;margin-left:6px;font-family:Sora,sans-serif;" title="Stop">✕</button></div>`;
  } else if (!_isSpeaking) { area.innerHTML = ''; }
}

function _autoStartPatientMic() {
  console.log('[Mic] _autoStartPatientMic — _patientVoiceEnabled:', _patientVoiceEnabled, '_isRecording:', _isRecording, '_SR:', !!_SR);
  if (!_patientVoiceEnabled || _isRecording || !_SR) return;
  try {
    _recognition = new _SR();
    _recognition.lang = _sessionLang || 'en-US';
    _recognition.interimResults = true;
    _recognition.continuous = false;

    const micBtn = document.getElementById('mic-btn');
    const input  = document.getElementById('answer-input');
    input.value  = '';

    _recognition.onstart = () => {
      _isRecording = true;
      if (micBtn) { micBtn.classList.add('recording'); micBtn.title = 'Recording… click to stop'; }
      _setListeningUI(true);
      stopSpeaking();
    };
    _recognition.onresult = (e) => {
      let interim = '', final = '';
      for (const r of e.results) { if (r.isFinal) final += r[0].transcript; else interim += r[0].transcript; }
      input.value = final || interim;
      autoResize(input);
    };
    _recognition.onerror = (e) => {
      console.warn('[Mic] STT error:', e.error);
      _stopRecognitionUI();
      if (e.error === 'not-allowed') _promptMicTap();
    };
    _recognition.onend = () => {
      _stopRecognitionUI();
      if (_patientVoiceEnabled) {
        const val = document.getElementById('answer-input')?.value?.trim();
        if (val) setTimeout(() => sendAnswer(), 400);
      }
    };
    _recognition.start();
    console.log('[Mic] _recognition.start() called — lang:', _recognition.lang);
  } catch(err) {
    console.error('[Mic] start failed:', err);
    _isRecording = false;
  }
}

function _replayBubble(bubbleId) {
  const el = document.getElementById(`${bubbleId}-text`);
  if (el) speakQuestion(el.textContent);
}

_applyVoiceUI();
init();
</script>
