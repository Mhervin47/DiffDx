<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiffDx — AI Diagnostic Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh; display: flex; flex-direction: column;
      background: #080b14; color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,180,216,.13) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(56,189,248,.05) 0%, transparent 60%);
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 0%, black 0%, transparent 100%);
    }

    /* ── Nav ── */
    .nav {
      position: relative; z-index: 10;
      display: flex; align-items: center;
      padding: 0 28px; height: 60px;
      background: rgba(8,11,20,.8);
      border-bottom: 1px solid rgba(255,255,255,.05);
      backdrop-filter: blur(12px);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 9px;
      font-size: 15px; font-weight: 700; letter-spacing: -.01em; color: #e2e8f0;
    }
    .nav-brand svg { color: #00b4d8; }
    .nav-brand span { color: #00b4d8; }
    .nav-spacer { flex: 1; }

    /* ── Hero ── */
    .hero {
      position: relative; z-index: 1;
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 24px 100px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: #00b4d8;
      background: rgba(0,180,216,.08); border: 1px solid rgba(0,180,216,.2);
      padding: 5px 14px; border-radius: 99px; margin-bottom: 32px;
    }
    .eyebrow-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #00b4d8; box-shadow: 0 0 8px rgba(0,180,216,.9);
      animation: blink 2s ease infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }

    .headline {
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 900; line-height: 1.05;
      letter-spacing: -.04em; color: #f8fafc;
      margin-bottom: 20px;
      max-width: 700px;
    }
    .headline em {
      font-style: normal;
      background: linear-gradient(95deg, #00b4d8 0%, #38bdf8 50%, #7dd3fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: 16px; font-weight: 400; color: #64748b;
      line-height: 1.6; max-width: 400px; margin-bottom: 44px;
    }

    /* ── CTA ── */
    .cta-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: #00b4d8; color: #080b14;
      font-size: 15px; font-weight: 800; letter-spacing: -.01em;
      padding: 14px 32px; border-radius: 14px; border: none; cursor: pointer;
      transition: all .2s; box-shadow: 0 0 32px rgba(0,180,216,.25);
      text-decoration: none;
    }
    .cta-btn:hover {
      background: #38bdf8; transform: translateY(-2px);
      box-shadow: 0 0 48px rgba(0,180,216,.4);
    }
    .cta-btn svg { transition: transform .2s; }
    .cta-btn:hover svg { transform: translateX(3px); }

    /* ── Feature chips ── */
    .chips {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; justify-content: center;
      margin-top: 52px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 99px; padding: 7px 16px;
      font-size: 12px; font-weight: 600; color: #94a3b8;
      transition: all .15s;
    }
    .chip:hover { border-color: rgba(0,180,216,.3); color: #e2e8f0; }
    .chip-dot {
      width: 5px; height: 5px; border-radius: 50%;
      flex-shrink: 0;
    }

    .chip-sep {
      width: 1px; height: 16px;
      background: rgba(255,255,255,.08);
    }

    #nav-auth { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<nav class="nav">
  <div class="nav-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
    </svg>
    Medical<span>Convo</span>
  </div>
  <div class="nav-spacer"></div>
  <div id="nav-auth"></div>
</nav>

<section class="hero">

  <div class="eyebrow">
    <span class="eyebrow-dot"></span>
    AI Diagnostic Assistant
  </div>

  <h1 class="headline">
    Describe symptoms.<br>
    <em>Get a diagnosis.</em>
  </h1>

  <p class="sub">
    A focused AI interview that builds your differential in real time.
  </p>

  <a class="cta-btn" onclick="window.location.href='/patient-info.html'">
    Start Session
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  </a>

  <div class="chips">
    <div class="chip">
      <span class="chip-dot" style="background:#00b4d8;box-shadow:0 0 6px rgba(0,180,216,.7);"></span>
      Multi-turn dialogue
    </div>
    <div class="chip-sep"></div>
    <div class="chip">
      <span class="chip-dot" style="background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.7);"></span>
      Live differential
    </div>
    <div class="chip-sep"></div>
    <div class="chip">
      <span class="chip-dot" style="background:#8b5cf6;box-shadow:0 0 6px rgba(139,92,246,.7);"></span>
      Critic evaluation
    </div>
    <div class="chip-sep"></div>
    <div class="chip">
      <span class="chip-dot" style="background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.7);"></span>
      Final report
    </div>
  </div>

</section>

</body>
</html>
